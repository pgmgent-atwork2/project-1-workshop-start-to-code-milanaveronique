<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Guess the Movie</title>
</head>

<body class="game-page">
    <h1 class="title">Guess the Movie</h1>
    <p>Can you guess the movie from its emoji's?</p>

    <h2 id="movie-emoji" class="movie-emoji"></h2>

    <p id="movie-hint" class="no-display movie-hint"></p>

    <p id="tries-left" class="tries-left">Tries left: 5</p>

    <input type="text" id="guess-input" class="guess-input" placeholder="Enter your guess..." />
    <button id="submit-guess" class="submit-guess">Submit Guess</button>

    <button id="new-game" class="new-game">Next Movie</button>

    <modal id="modal" class="no-display modal">
        <div class="modal-content">
            <span id="close-modal" class="close">&times;</span>
            <p id="modal-message" class="modal-message"></p>
        </div>
    </modal>

    <a class="link-button" href="./pages/tutorial.html">Tutorial</a>

    <script type="module" src="/src/scripts/main.js"></script>
</body>

</html>
